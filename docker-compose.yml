services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fawlty_development
    ports:
      - "5432:5432"
    volumes:
      - fawlty_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/fawlty_development
      HANAMI_ENV: development
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "2300:2300"
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY: http://backend:2300
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  fawlty_pgdata:
  bundle_cache:
  frontend_node_modules:
